<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Emotion System 3.0</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:url("images/8.jpg") center/cover no-repeat fixed;
}

/* 🌟 玻璃容器 */
.container{
  width:430px;
  margin:60px auto;
  padding:35px;
  background:rgba(255,255,255,0.85);
  border-radius:24px;
  text-align:center;
  box-shadow:0 25px 70px rgba(0,0,0,0.18);
  backdrop-filter: blur(6px);
}

h1{
  color:#ff6fae;
  margin-bottom:10px;
}

/* 🌸 封面图 */
.header-img{
  width:240px;
  height:240px;
  margin:18px auto 25px;
  background:url("images/5.png") center/cover no-repeat;
  border-radius:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
  transition:0.3s;
}

.header-img:hover{
  transform:scale(1.05) rotate(1deg);
}

/* 🔘 按钮 */
.btn{
  width:85%;
  margin:10px auto;
  padding:14px;
  border:none;
  border-radius:14px;
  background:white;
  cursor:pointer;
  font-size:15px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  transition:0.25s;
}

.btn:hover{
  transform:translateY(-3px);
  background:#fff0f6;
}
</style>
</head>

<body>

<div class="container">
  <h1>🌸 Emotion System 3.0</h1>

  <div class="header-img"></div>

  <button class="btn" onclick="location.href='mood.html'">💗 Mood 情绪系统</button>
  <button class="btn" onclick="location.href='diary.html'">📖 Diary 情绪日记</button>
  <button class="btn" onclick="location.href='gallery.html'">🖼 Gallery 拼贴</button>
  <button class="btn" onclick="location.href='timeline.html'">⏳ Timeline 时间轴</button>
  <button class="btn" onclick="location.href='plan.html'">🌙 Plan 晚安计划</button>
</div>

<!-- 🧠 ⭐关键修复：统一系统入口 -->
<script src="core.js"></script>

<script>
/* =========================
   🧠 Emotion OS 初始化（关键补丁）
   👉 防止你打开空数据
========================= */

function initEmotionDB(){
  let exist = localStorage.getItem("emotionOS");

  if(!exist){
    localStorage.setItem("emotionOS", JSON.stringify([]));
  }
}

/* 🟢 初始化执行 */
initEmotionDB();

/* =========================
   🌙 可选：标记系统版本
========================= */
localStorage.setItem("emotion_version", "3.0-fixed");

</script>

</body>
</html>
