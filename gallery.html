
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Gallery Mood System</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background: url("images/8.jpg") center/cover no-repeat fixed;
}
/* 🌈 遮罩 */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(1px);
}
/* 📦 容器 */
#gallery{
  position:relative;
  width:100vw;
  height:100vh;
}
/* 🖼 图片 */
.photo{
  width:80px;
  border-radius:12px;
  position:absolute;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  transition: transform 0.2s;
}
.photo:hover{
  transform: scale(1.08);
}
/* 🔘 按钮 */
.toolbar{
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
}
</style>
</head>
<body>
<div id="gallery"></div>
<div class="toolbar">
  <button onclick="shuffle()">🎲 打乱</button>
  <button onclick="addImage()">➕ 添加</button>
</div>
<!-- ⭐必须加载核心 -->
<script src="core.js"></script>
<script src="gallery.js"></script>
</body>
</html>
