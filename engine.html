<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Emotion Timeline FIX</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:url("images/8.jpg") center/cover no-repeat fixed;
}

.container{
  width:680px;
  margin:60px auto;
  padding:30px;
  background:rgba(255,255,255,0.92);
  border-radius:20px;
}

h1{
  text-align:center;
  color:#ff6fae;
}

.line{
  border-left:3px solid #ffb6d5;
  padding-left:25px;
  margin-left:20px;
}

.item{
  margin:18px 0;
  padding:15px;
  background:white;
  border-radius:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  transition:0.3s;
}

.item:hover{
  transform:translateX(6px);
}

.item::before{
  content:"";
  position:absolute;
  left:18px;
  margin-top:18px;
  width:10px;
  height:10px;
  background:#ff6fae;
  border-radius:50%;
}

.time{
  font-size:12px;
  color:#999;
}

/* 🌈 强化显示（关键修复） */
.mood-happy,.mood-开心{color:#ffb703;}
.mood-calm,.mood-平静{color:#3ccf91;}
.mood-sad,.mood-低落{color:#4d96ff;}
.mood-tired,.mood-疲惫{color:#8e8e8e;}
.mood-relax,.mood-放松{color:#ff6fae;}
.mood-think,.mood-思考{color:#b388ff;}
</style>
</head>

<body>

<div class="container">
  <h1>⏳ Emotion Timeline</h1>
  <div class="line" id="box"></div>
</div>

<script>

/* =========================
🧠 兼容所有数据源（关键修复）
========================= */
function getData(){

  return JSON.parse(
    localStorage.getItem("emotionOS") ||
    localStorage.getItem("moodData") ||
    "[]"
  );
}

/* =========================
🚀 渲染（强制保证可见）
========================= */
function load(){

  const box = document.getElementById("box");
  const data = getData();

  box.innerHTML = "";

  if(!data.length){
    box.innerHTML = "<p style='color:#999'>暂无情绪记录</p>";
    return;
  }

  data.slice().reverse().forEach(d=>{

    let mood = d.mood || "unknown";

    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="mood-${mood}">💗 ${mood}</div>
      <div>${d.text || ""}</div>
      <div class="time">${d.time || ""}</div>
    `;

    box.appendChild(div);
  });
}

/* =========================
🚀 强制等待DOM（关键修复）
========================= */
window.onload = load;

</script>

</body>
</html>
