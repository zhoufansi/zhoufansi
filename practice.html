<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Practice</title>

<style>
body{
  margin:0;
  font-family:"PingFang SC";
  background:url("images/8.jpg") center/cover no-repeat fixed;
}

.box{
  width:700px;
  margin:60px auto;
  background:rgba(255,255,255,0.92);
  padding:30px;
  border-radius:20px;
}

textarea{
  width:100%;
  height:140px;
  border-radius:12px;
  padding:10px;
}

.btn{
  display:inline-block;
  margin-top:10px;
  padding:10px 14px;
  background:#7aa7ff;
  color:white;
  border-radius:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2 id="title"></h2>
<div id="content"></div>
</div>

<script>

const params = new URLSearchParams(location.search);
const type = params.get("type");
const mood = params.get("mood");

document.getElementById("title").innerText = "Emotion Practice";

/* =========================
✨ 创作
========================= */
if(type === "creative"){

document.getElementById("content").innerHTML=`
<textarea id="text" placeholder="写下情绪..."></textarea>
<div class="btn" onclick="save()">保存</div>
<div id="list"></div>
`;

function save(){

let data = JSON.parse(localStorage.getItem("emotionOS")||"[]");

data.push({
mood,
type,
text:document.getElementById("text").value,
time:new Date().toLocaleString()
});

localStorage.setItem("emotionOS",JSON.stringify(data));
load();
}

function load(){

let list=document.getElementById("list");
let data=JSON.parse(localStorage.getItem("emotionOS")||"[]");

list.innerHTML=data.map(d=>`
<div style="margin-top:10px;padding:10px;background:#fff;border-radius:10px;">
${d.text}<br><small>${d.time}</small>
</div>
`).join("");
}

load();
}

/* =========================
🫧 呼吸
========================= */
if(type === "breath"){

document.getElementById("content").innerHTML=`
<div id="circle" style="width:100px;height:100px;background:#7aa7ff;border-radius:50%;margin:auto;"></div>
<button onclick="start()">开始</button>
`;

let i=0;
let timer;

window.start=function(){

clearInterval(timer);

timer=setInterval(()=>{
let c=document.getElementById("circle");
c.style.transform = i%2===0?"scale(1.5)":"scale(1)";
i++;
},3000);

};

}

/* =========================
🧠 写作
========================= */
if(type === "write"){

document.getElementById("content").innerHTML=`
<textarea placeholder="写下你的情绪..."></textarea>
<div class="btn">保存</div>
`;
}

</script>

</body>
</html>
